<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Registro Cliente | Clínica Veterinaria</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'Poppins', Arial, sans-serif;
            background: linear-gradient(135deg, #e8f5e9, #e3f2fd);
            min-height: 100vh;
            color: #263238;
        }

        .container {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 35px 16px;
        }

        .card {
            width: 100%;
            max-width: 780px;
            background: #ffffff;
            border-radius: 26px;
            padding: 38px;
            box-shadow: 0 18px 50px rgba(46, 139, 87, 0.18);
        }

        .logo {
            width: 78px;
            height: 78px;
            margin: 0 auto 12px;
            border-radius: 50%;
            background: #e8f5e9;
            color: #2e8b57;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 38px;
        }

        h1 {
            text-align: center;
            color: #2e8b57;
            margin: 0;
            font-size: 30px;
            font-weight: 700;
        }

        .subtitle {
            text-align: center;
            color: #6b7280;
            margin: 8px 0 28px;
            font-size: 15px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 18px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .full {
            grid-column: 1 / -1;
        }

        label {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 7px;
            color: #374151;
        }

        input,
        select {
            height: 52px;
            border: 1.8px solid #d7e6dc;
            border-radius: 14px;
            padding: 0 15px;
            font-family: 'Poppins', Arial, sans-serif;
            font-size: 14px;
            outline: none;
            background: #fbfefc;
            transition: 0.2s ease;
        }

        input:focus,
        select:focus {
            border-color: #2e8b57;
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(46, 139, 87, 0.12);
        }

        small {
            margin-top: 6px;
            color: #6b7280;
            font-size: 12px;
        }

        .captcha-box {
            margin-top: 22px;
            padding: 18px;
            border-radius: 18px;
            background: #f1f8f4;
            border: 1.8px dashed #93d2aa;
        }

        .captcha-row {
            display: grid;
            grid-template-columns: 150px 1fr;
            gap: 14px;
            align-items: center;
        }

        .captcha-question {
            height: 52px;
            border-radius: 14px;
            background: white;
            border: 1.8px solid #d7e6dc;
            color: #2e8b57;
            font-size: 20px;
            font-weight: 700;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .btn-primary {
            width: 100%;
            height: 54px;
            border: none;
            margin-top: 24px;
            border-radius: 15px;
            background: linear-gradient(135deg, #2e8b57, #58c878);
            color: white;
            font-family: 'Poppins', Arial, sans-serif;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s ease;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 22px rgba(46, 139, 87, 0.24);
        }

        .btn-secondary {
            display: block;
            text-align: center;
            margin-top: 14px;
            padding: 14px;
            border-radius: 15px;
            background: #e8f5e9;
            color: #2e8b57;
            text-decoration: none;
            font-weight: 600;
        }

        .btn-secondary:hover {
            background: #d9efdd;
        }

        .alert {
            padding: 13px;
            border-radius: 14px;
            margin-bottom: 18px;
            text-align: center;
            font-size: 14px;
        }

        .error {
            background: #fdecea;
            color: #b42318;
        }

        @media (max-width: 700px) {
            .card {
                padding: 28px 20px;
            }

            .grid {
                grid-template-columns: 1fr;
            }

            .full {
                grid-column: auto;
            }

            .captcha-row {
                grid-template-columns: 1fr;
            }

            h1 {
                font-size: 26px;
            }
        }
    </style>
</head>

<body>

<div class="container">
    <div class="card">

        <div class="logo">🐶</div>
        <h1>Registro de Cliente</h1>
        <p class="subtitle">Crea tu cuenta para gestionar tus mascotas</p>

        <div th:if="${error}" class="alert error" th:text="${error}"></div>

        <form action="/registro-cliente" method="post">

            <div class="grid">
                <div class="form-group">
                    <label>Nombres</label>
                    <input name="nombres" placeholder="Ej: Sebastián" required>
                </div>

                <div class="form-group">
                    <label>Apellidos</label>
                    <input name="apellidos" placeholder="Ej: Castiblanco" required>
                </div>

                <div class="form-group">
                    <label>Tipo de documento</label>
                    <select name="tipoDocumento" required>
                        <option value="">Selecciona una opción</option>
                        <option value="CC">Cédula de ciudadanía</option>
                        <option value="CE">Cédula de extranjería</option>
                        <option value="TI">Tarjeta de identidad</option>
                        <option value="PASAPORTE">Pasaporte</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Número de documento</label>
                    <input name="numeroDocumento" placeholder="Ej: 1000000000" required>
                </div>

                <div class="form-group">
                    <label>Correo electrónico</label>
                    <input type="email" name="correo" placeholder="tu@email.com" required>
                </div>

                <div class="form-group">
                    <label>Teléfono</label>
                    <input name="telefono" placeholder="Ej: 3000000000" required>
                </div>

                <div class="form-group full">
                    <label>Dirección</label>
                    <input name="direccion" placeholder="Dirección de residencia" required>
                </div>

                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" name="password" placeholder="Crea una contraseña" required
                           pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[\W_]).{8,}$">
                    <small>Mínimo 8 caracteres, una mayúscula, una minúscula, un número y un símbolo.</small>
                </div>

                <div class="form-group">
                    <label>Confirmar contraseña</label>
                    <input type="password" name="confirmarPassword" placeholder="Repite tu contraseña" required>
                </div>
            </div>

            <div class="captcha-box">
                <label>Captcha de seguridad</label>
                <div class="captcha-row">
                    <div class="captcha-question">
                        <span id="num1"></span> + <span id="num2"></span> =
                    </div>

                    <input type="number" name="captchaRespuesta" placeholder="Escribe la respuesta" required>
                    <input type="hidden" name="captcha" id="captcha">
                </div>
            </div>

            <button type="submit" class="btn-primary">Registrar cliente</button>
            <a href="/login" class="btn-secondary">Volver al login</a>

        </form>
    </div>
</div>

<script>
    let a = Math.floor(Math.random() * 9) + 1;
    let b = Math.floor(Math.random() * 9) + 1;

    document.getElementById("num1").innerText = a;
    document.getElementById("num2").innerText = b;
    document.getElementById("captcha").value = a + b;
</script>

</body>
</html>
