<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Buscar Mascotas</title>

    <style>
        body{
            margin:0;
            font-family:Poppins,sans-serif;
            background:linear-gradient(135deg,#e8f5e9,#e3f2fd);
        }

        .container{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .card{
            background:white;
            padding:40px;
            border-radius:25px;
            width:100%;
            max-width:500px;
            box-shadow:0 18px 50px rgba(46,139,87,.15);
        }

        h1{
            color:#2e8b57;
            text-align:center;
        }

        input{
            width:100%;
            height:50px;
            border-radius:14px;
            border:1px solid #ccc;
            padding:0 15px;
            margin-top:20px;
        }

        button{
            width:100%;
            height:52px;
            border:none;
            border-radius:14px;
            margin-top:20px;
            background:#2e8b57;
            color:white;
            font-weight:bold;
            cursor:pointer;
        }

        a{
            display:block;
            text-align:center;
            margin-top:14px;
            text-decoration:none;
            color:#2e8b57;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="card">

        <h1>Buscar Mascotas</h1>

        <form action="/cliente/mis-mascotas" method="post">

            <input type="text"
                   name="documento"
                   placeholder="Número de documento"
                   required>

            <button type="submit">
                Buscar
            </button>

        </form>

        <a href="/cliente/inicio">
            Volver al menú
        </a>

    </div>

</div>

</body>
</html>
