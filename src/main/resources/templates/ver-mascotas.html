
<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>Ver Mascotas</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins', sans-serif;
        }

        body{

            background:#dfe9e6;

            min-height:100vh;

            padding:40px;
        }

        .container{

            max-width:1300px;

            margin:auto;
        }

        .header{

            background:#f5f5f5;

            border-radius:25px;

            padding:35px;

            margin-bottom:30px;

            box-shadow:0 10px 30px rgba(0,0,0,0.08);
        }

        .title{

            font-size:38px;

            color:#2f855a;

            font-weight:bold;
        }

        .subtitle{

            margin-top:10px;

            color:#666;
        }

        .card{

            background:#f5f5f5;

            border-radius:25px;

            padding:30px;

            box-shadow:0 10px 30px rgba(0,0,0,0.08);
        }

        table{

            width:100%;

            border-collapse:collapse;
        }

        th{

            background:#dce8de;

            color:#2f855a;

            padding:16px;

            text-align:left;
        }

        td{

            background:white;

            padding:16px;

            border-bottom:1px solid #ddd;
        }

        tr:hover td{

            background:#f1f8f4;
        }

        .btn-historial{

            background:#2f855a;

            color:white;

            padding:10px 14px;

            border-radius:10px;

            text-decoration:none;

            font-weight:bold;
        }

        .btn-historial:hover{

            background:#276749;
        }

        .btn-volver{

            display:inline-block;

            margin-top:25px;

            background:#2f855a;

            color:white;

            text-decoration:none;

            padding:14px 20px;

            border-radius:12px;

            font-weight:bold;
        }

        .btn-volver:hover{

            background:#276749;
        }

        .empty{

            text-align:center;

            padding:30px;

            color:#666;
        }

    </style>

</head>

<body>

<div class="container">

    <div class="header">

        <div class="title">
            🐶 Mascotas Registradas
        </div>

        <div class="subtitle">
            Consulta mascotas y administra historiales clínicos
        </div>

    </div>

    <div class="card">

        <table th:if="${not #lists.isEmpty(mascotas)}">

            <tr>

                <th>Nombre</th>

                <th>Especie</th>

                <th>Raza</th>

                <th>Color</th>

                <th>Dueño</th>

                <th>Documento</th>

                <th>Historial</th>

            </tr>

            <tr th:each="mascota : ${mascotas}">

                <td th:text="${mascota.nombre}"></td>

                <td th:text="${mascota.especie}"></td>

                <td th:text="${mascota.raza}"></td>

                <td th:text="${mascota.color}"></td>

                <td th:text="${mascota.cliente.nombres}"></td>

                <td th:text="${mascota.cliente.numeroDocumento}"></td>

                <td>

                    <a th:href="@{/historial/{id}(id=${mascota.id})}"
                       class="btn-historial">

                        Ver Historial

                    </a>

                </td>

            </tr>

        </table>

        <div class="empty"
             th:if="${#lists.isEmpty(mascotas)}">

            No existen mascotas registradas.

        </div>

        <a href="/veterinario/inicio"
           class="btn-volver">

            ← Volver al Panel

        </a>

    </div>

</div>

</body>
</html>
