<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>Historiales Clínicos</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins', sans-serif;
        }

        body{

            background:#dfe9e6;

            min-height:100vh;

            padding:40px;
        }

        .container{

            max-width:1200px;

            margin:auto;
        }

        .header{

            background:#f5f5f5;

            padding:35px;

            border-radius:25px;

            margin-bottom:30px;

            box-shadow:0 10px 30px rgba(0,0,0,0.08);
        }

        .title{

            font-size:38px;

            color:#2f855a;

            font-weight:bold;
        }

        .subtitle{

            margin-top:10px;

            color:#666;

            font-size:16px;
        }

        .card{

            background:#f5f5f5;

            border-radius:25px;

            padding:30px;

            box-shadow:0 10px 30px rgba(0,0,0,0.08);
        }

        .search-box{

            display:flex;

            gap:15px;

            margin-bottom:30px;
        }

        .search-box input{

            flex:1;

            padding:15px;

            border:none;

            border-radius:14px;

            background:#dbe4ee;

            font-size:15px;
        }

        .btn{

            background:#2f855a;

            color:white;

            border:none;

            padding:14px 22px;

            border-radius:14px;

            font-weight:bold;

            cursor:pointer;
        }

        .btn:hover{

            background:#276749;
        }

        table{

            width:100%;

            border-collapse:collapse;
        }

        th{

            background:#dce8de;

            color:#2f855a;

            padding:16px;

            text-align:left;
        }

        td{

            background:white;

            padding:16px;

            border-bottom:1px solid #ddd;
        }

        tr:hover td{

            background:#f1f8f4;
        }

        .btn-historial{

            background:#2f855a;

            color:white;

            padding:10px 14px;

            border-radius:10px;

            text-decoration:none;

            font-weight:bold;
        }

        .btn-historial:hover{

            background:#276749;
        }

        .empty{

            text-align:center;

            padding:30px;

            color:#666;
        }

    </style>

</head>

<body>

<div class="container">

    <div class="header">

        <div class="title">
            🩺 Historiales Clínicos
        </div>

        <div class="subtitle">
            Consulta y administra historiales veterinarios
        </div>

    </div>

    <div class="card">

        <form action="/historiales"
              method="get"
              class="search-box">

            <input type="text"
                   name="buscar"
                   placeholder="Buscar por mascota o documento">

            <button type="submit"
                    class="btn">

                Buscar

            </button>

        </form>

        <table th:if="${not #lists.isEmpty(mascotas)}">

            <tr>

                <th>Mascota</th>

                <th>Especie</th>

                <th>Raza</th>

                <th>Dueño</th>

                <th>Historial</th>

            </tr>

            <tr th:each="mascota : ${mascotas}">

                <td th:text="${mascota.nombre}"></td>

                <td th:text="${mascota.especie}"></td>

                <td th:text="${mascota.raza}"></td>

                <td th:text="${mascota.cliente.nombres}"></td>

                <td>

                    <a th:href="@{/historial/{id}(id=${mascota.id})}"
                       class="btn-historial">

                        Ver Historial

                    </a>

                </td>

            </tr>

        </table>

        <div class="empty"
             th:if="${#lists.isEmpty(mascotas)}">

            No hay mascotas registradas.

        </div>

    </div>

</div>

</body>
</html>
