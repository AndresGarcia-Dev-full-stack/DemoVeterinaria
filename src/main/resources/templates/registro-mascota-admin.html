<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title><h1>Registro Mascota Admin</h1></title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

        *{
            box-sizing:border-box;
        }

        body{
            margin:0;
            font-family:'Poppins',Arial,sans-serif;
            background:linear-gradient(135deg,#e8f5e9,#e3f2fd);
            min-height:100vh;
            color:#263238;
        }

        .container{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:35px 16px;
        }

        .card{
            width:100%;
            max-width:900px;
            background:#fff;
            border-radius:26px;
            padding:38px;
            box-shadow:0 18px 50px rgba(46,139,87,.18);
        }

        .logo{
            width:82px;
            height:82px;
            margin:0 auto 14px;
            border-radius:50%;
            background:#e8f5e9;
            color:#2e8b57;
            display:flex;
            justify-content:center;
            align-items:center;
            font-size:40px;
        }

        h1{
            text-align:center;
            color:#2e8b57;
            margin:0;
            font-size:31px;
            font-weight:700;
        }

        .subtitle{
            text-align:center;
            color:#6b7280;
            margin:8px 0 30px;
            font-size:15px;
        }

        .grid{
            display:grid;
            grid-template-columns:repeat(2,1fr);
            gap:18px;
        }

        .form-group{
            display:flex;
            flex-direction:column;
        }

        .full{
            grid-column:1/-1;
        }

        label{
            font-size:14px;
            font-weight:600;
            margin-bottom:7px;
            color:#374151;
        }

        input,
        select,
        textarea{
            width:100%;
            border:1.8px solid #d7e6dc;
            border-radius:14px;
            padding:0 15px;
            font-family:'Poppins',Arial,sans-serif;
            font-size:14px;
            outline:none;
            background:#fbfefc;
            transition:.2s ease;
        }

        input,
        select{
            height:52px;
        }

        textarea{
            min-height:110px;
            padding-top:14px;
            resize:vertical;
        }

        input:focus,
        select:focus,
        textarea:focus{
            border-color:#2e8b57;
            background:#fff;
            box-shadow:0 0 0 4px rgba(46,139,87,.12);
        }

        .btn-primary{
            width:100%;
            height:56px;
            border:none;
            margin-top:26px;
            border-radius:15px;
            background:linear-gradient(135deg,#2e8b57,#58c878);
            color:white;
            font-family:'Poppins',Arial,sans-serif;
            font-size:16px;
            font-weight:700;
            cursor:pointer;
            transition:.2s ease;
        }

        .btn-primary:hover{
            transform:translateY(-1px);
            box-shadow:0 10px 22px rgba(46,139,87,.24);
        }

        .btn-secondary{
            display:block;
            text-align:center;
            margin-top:14px;
            padding:14px;
            border-radius:15px;
            background:#e8f5e9;
            color:#2e8b57;
            text-decoration:none;
            font-weight:600;
        }

        .btn-secondary:hover{
            background:#d9efdd;
        }

        .alert{
            padding:14px;
            border-radius:14px;
            margin-bottom:20px;
            text-align:center;
            font-size:14px;
            font-weight:500;
        }

        .success{
            background:#ecfdf3;
            color:#067647;
        }

        .error{
            background:#fdecea;
            color:#b42318;
        }

        @media(max-width:700px){

            .card{
                padding:28px 20px;
            }

            .grid{
                grid-template-columns:1fr;
            }

            .full{
                grid-column:auto;
            }

            h1{
                font-size:26px;
            }
        }
    </style>
</head>

<body>

<div class="container">

    <div class="card">

        <div class="logo">🐾</div>

        <h1>Registro de Mascota</h1>

        <p class="subtitle">
            Registra una mascota y asóciala a un cliente existente
        </p>

        <!-- MENSAJE -->
        <div th:if="${mensaje}"
             class="alert"
             th:classappend="${mensaje.contains('correctamente')} ? ' success' : ' error'"
             th:text="${mensaje}">
        </div>

        <form action="/veterinario/registro-mascota"
              method="post">

            <div class="grid">

                <!-- CLIENTE -->
                <div class="form-group full">
                    <label>Documento del cliente</label>

                    <input type="text"
                           name="documentoCliente"
                           placeholder="Ingresa el documento del cliente"
                           required>
                </div>

                <!-- MASCOTA -->
                <div class="form-group">
                    <label>Nombre de la mascota</label>

                    <input type="text"
                           name="nombre"
                           placeholder="Ej: Max"
                           required>
                </div>

                <div class="form-group">
                    <label>Especie</label>

                    <select name="especie" required>
                        <option value="">Selecciona</option>
                        <option value="Perro">Perro</option>
                        <option value="Gato">Gato</option>
                        <option value="Ave">Ave</option>
                        <option value="Conejo">Conejo</option>
                        <option value="Hamster">Hamster</option>
                        <option value="Otro">Otro</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Raza</label>

                    <input type="text"
                           name="raza"
                           placeholder="Ej: Golden Retriever"
                           required>
                </div>

                <div class="form-group">
                    <label>Edad</label>

                    <input type="number"
                           name="edad"
                           placeholder="Edad"
                           required>
                </div>

                <div class="form-group">
                    <label>Peso (kg)</label>

                    <input type="number"
                           step="0.1"
                           name="peso"
                           placeholder="Ej: 12.5"
                           required>
                </div>

                <div class="form-group">
                    <label>Sexo</label>

                    <select name="sexo" required>
                        <option value="">Selecciona</option>
                        <option value="Macho">Macho</option>
                        <option value="Hembra">Hembra</option>
                    </select>
                </div>

                <div class="form-group full">
                    <label>Color</label>

                    <input type="text"
                           name="color"
                           placeholder="Ej: Café con blanco"
                           required>
                </div>

                <div class="form-group full">
                    <label>Observaciones</label>

                    <textarea name="observaciones"
                              placeholder="Información adicional sobre la mascota"></textarea>
                </div>

            </div>

            <button type="submit" class="btn-primary">
                Registrar mascota
            </button>

            <a href="/veterinario/inicio" class="btn-secondary">
                Volver al menú
            </a>

        </form>

    </div>

</div>

</body>
</html>
