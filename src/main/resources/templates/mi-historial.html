<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>Mi Historial</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins', sans-serif;
        }

        body{

            background:#dfe9e6;

            min-height:100vh;

            padding:40px;
        }

        .container{

            max-width:1200px;

            margin:auto;
        }

        .header{

            background:#f5f5f5;

            padding:35px;

            border-radius:25px;

            margin-bottom:30px;

            box-shadow:0 10px 30px rgba(0,0,0,0.08);
        }

        .title{

            font-size:38px;

            color:#2f855a;

            font-weight:bold;
        }

        .subtitle{

            margin-top:10px;

            color:#666;
        }

        .card{

            background:#f5f5f5;

            border-radius:25px;

            padding:30px;

            margin-bottom:30px;

            box-shadow:0 10px 30px rgba(0,0,0,0.08);
        }

        .section-title{

            font-size:28px;

            color:#2f855a;

            margin-bottom:20px;

            font-weight:bold;
        }

        table{

            width:100%;

            border-collapse:collapse;
        }

        th{

            background:#dce8de;

            color:#2f855a;

            padding:16px;

            text-align:left;
        }

        td{

            background:white;

            padding:16px;

            border-bottom:1px solid #ddd;
        }

        tr:hover td{

            background:#f1f8f4;
        }

        .empty{

            text-align:center;

            padding:30px;

            color:#666;
        }

        .btn-volver{

            display:inline-block;

            margin-top:20px;

            text-decoration:none;

            background:#2f855a;

            color:white;

            padding:14px 20px;

            border-radius:12px;

            font-weight:bold;
        }

        .btn-volver:hover{

            background:#276749;
        }

    </style>

</head>

<body>

<div class="container">

    <div class="header">

        <div class="title">
            🩺 Mi Historial Clínico
        </div>

        <div class="subtitle">
            Consulta citas y registros veterinarios
        </div>

    </div>

    <!-- CITAS -->

    <div class="card">

        <div class="section-title">
            📅 Citas Agendadas
        </div>

        <table th:if="${not #lists.isEmpty(citas)}">

            <tr>

                <th>Mascota</th>

                <th>Fecha</th>

                <th>Hora</th>

                <th>Motivo</th>

            </tr>

            <tr th:each="c : ${citas}">

                <td th:text="${c.mascota}"></td>

                <td th:text="${c.fecha}"></td>

                <td th:text="${c.hora}"></td>

                <td th:text="${c.motivo}"></td>

            </tr>

        </table>

        <div class="empty"
             th:if="${#lists.isEmpty(citas)}">

            No hay citas agendadas.

        </div>

    </div>

    <!-- HISTORIAL -->

    <div class="card">

        <div class="section-title">
            📋 Historial Médico
        </div>

        <table th:if="${not #lists.isEmpty(historial)}">

            <tr>

                <th>Fecha</th>

                <th>Tipo</th>

                <th>Descripción</th>

            </tr>

            <tr th:each="h : ${historial}">

                <td th:text="${h.fecha}"></td>

                <td th:text="${h.tipo}"></td>

                <td th:text="${h.descripcion}"></td>

            </tr>

        </table>

        <div class="empty"
             th:if="${#lists.isEmpty(historial)}">

            No existen registros clínicos.

        </div>

        <a href="/cliente/inicio"
           class="btn-volver">

            ← Volver al Panel

        </a>

    </div>

</div>

</body>
</html>
