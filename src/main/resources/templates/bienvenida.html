<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Bienvenido | Clínica Veterinaria</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');
        *{box-sizing:border-box}
        body{margin:0;font-family:'Poppins',Arial,sans-serif;background:linear-gradient(135deg,#e8f5e9,#e3f2fd);min-height:100vh;color:#263238}
        .container{min-height:100vh;display:flex;justify-content:center;align-items:center;padding:35px 16px}
        .card{width:100%;max-width:460px;background:#fff;border-radius:26px;padding:42px;box-shadow:0 18px 50px rgba(46,139,87,.18);text-align:center}
        .logo{width:86px;height:86px;margin:0 auto 16px;border-radius:50%;background:#e8f5e9;color:#2e8b57;display:flex;justify-content:center;align-items:center;font-size:42px}
        h1{color:#2e8b57;margin:0;font-size:30px;font-weight:700}
        p{color:#6b7280;margin:10px 0 28px;font-size:15px}
        .btn-primary{display:block;width:100%;padding:15px;border-radius:15px;background:linear-gradient(135deg,#2e8b57,#58c878);color:white;text-decoration:none;font-weight:700}
        .btn-secondary{display:block;margin-top:14px;padding:14px;border-radius:15px;background:#e8f5e9;color:#2e8b57;text-decoration:none;font-weight:600}
    </style>
</head>

<body>
<div class="container">
    <div class="card">
        <div class="logo">🐾</div>
        <h1>Bienvenido</h1>
        <p>Has iniciado sesión correctamente en Clínica Veterinaria.</p>

        <a href="/login" class="btn-primary">Cerrar sesión</a>
    </div>
</div>
<a href="/facturas/crear">
    Facturación
</a>
</body>
</html>
