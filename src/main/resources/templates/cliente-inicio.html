<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel Cliente</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

        body{
            margin:0;
            font-family:'Poppins',sans-serif;
            background:linear-gradient(135deg,#e8f5e9,#e3f2fd);
        }

        .container{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:30px;
        }

        .card{
            width:100%;
            max-width:950px;
            background:white;
            border-radius:25px;
            padding:40px;
            box-shadow:0 18px 50px rgba(46,139,87,.15);
        }

        h1{
            text-align:center;
            color:#2e8b57;
            margin-bottom:10px;
        }

        p{
            text-align:center;
            color:#6b7280;
            margin-bottom:35px;
        }

        .grid{
            display:grid;
            grid-template-columns:repeat(2,1fr);
            gap:20px;
        }

        .option{
            background:#f4fbf6;
            border-radius:20px;
            padding:30px;
            text-decoration:none;
            color:#2e8b57;
            text-align:center;
            transition:.2s;
        }

        .option:hover{
            transform:translateY(-3px);
            background:#e8f5e9;
            box-shadow:0 10px 25px rgba(46,139,87,.15);
        }

        .icon{
            font-size:42px;
            margin-bottom:12px;
        }

        h2{
            margin:0;
            font-size:20px;
        }

        @media(max-width:700px){

            .grid{
                grid-template-columns:1fr;
            }

        }
    </style>
</head>

<body>

<div class="container">

    <div class="card">

        <h1>Panel Cliente</h1>

        <p>Bienvenido a la Clínica Veterinaria</p>

        <div class="grid">

            <a href="/cliente/mis-mascotas" class="option">
                <div class="icon">🐾</div>
                <h2>Mis Mascotas</h2>
            </a>

            <a href="/cliente/agendar-cita" class="option">
                <div class="icon">📅</div>
                <h2>Agendar Cita</h2>
            </a>

            <a href="/cliente/mi-historial" class="option">
                <div class="icon">🩺</div>
                <h2>Historial Clínico</h2>
            </a>

            <a href="/cliente/mis-facturas" class="option">
                <div class="icon">🧾</div>
                <h2>Mis Facturas</h2>
            </a>

            <a href="/login" class="option">
                <div class="icon">🚪</div>
                <h2>Cerrar Sesión</h2>
            </a>

        </div>

    </div>

</div>

</body>
</html>
