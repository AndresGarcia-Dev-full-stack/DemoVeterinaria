<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Recuperar contraseña | Clínica Veterinaria</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');
        *{box-sizing:border-box}
        body{margin:0;font-family:'Poppins',Arial,sans-serif;background:linear-gradient(135deg,#e8f5e9,#e3f2fd);min-height:100vh;color:#263238}
        .container{min-height:100vh;display:flex;justify-content:center;align-items:center;padding:35px 16px}
        .card{width:100%;max-width:430px;background:#fff;border-radius:26px;padding:38px;box-shadow:0 18px 50px rgba(46,139,87,.18);text-align:center}
        .logo{width:78px;height:78px;margin:0 auto 12px;border-radius:50%;background:#e8f5e9;color:#2e8b57;display:flex;justify-content:center;align-items:center;font-size:38px}
        h1{color:#2e8b57;margin:0;font-size:28px;font-weight:700}
        .subtitle{color:#6b7280;margin:8px 0 28px;font-size:15px}
        .form-group{text-align:left;margin-bottom:18px}
        label{font-size:14px;font-weight:600;margin-bottom:7px;color:#374151;display:block}
        input{width:100%;height:52px;border:1.8px solid #d7e6dc;border-radius:14px;padding:0 15px;font-family:'Poppins',Arial,sans-serif;font-size:14px;outline:none;background:#fbfefc}
        input:focus{border-color:#2e8b57;background:#fff;box-shadow:0 0 0 4px rgba(46,139,87,.12)}
        .btn-primary{width:100%;height:54px;border:none;margin-top:8px;border-radius:15px;background:linear-gradient(135deg,#2e8b57,#58c878);color:white;font-family:'Poppins',Arial,sans-serif;font-size:16px;font-weight:700;cursor:pointer}
        .btn-secondary{display:block;text-align:center;margin-top:14px;padding:14px;border-radius:15px;background:#e8f5e9;color:#2e8b57;text-decoration:none;font-weight:600}
        .alert{padding:13px;border-radius:14px;margin-bottom:18px;text-align:center;font-size:14px}.success{background:#ecfdf3;color:#067647}
    </style>
</head>

<body>
<div class="container">
    <div class="card">
        <div class="logo">🔐</div>
        <h1>Recuperar contraseña</h1>
        <p class="subtitle">Ingresa tu correo para recuperar el acceso</p>

        <div th:if="${mensaje}" class="alert success" th:text="${mensaje}"></div>

        <form action="/olvide-password" method="post">
            <div class="form-group">
                <label>Correo electrónico</label>
                <input type="email" name="correo" placeholder="tu@email.com" required>
            </div>

            <button type="submit" class="btn-primary">Enviar instrucciones</button>
            <a href="/login" class="btn-secondary">Volver al login</a>
        </form>
    </div>
</div>
</body>
</html>
